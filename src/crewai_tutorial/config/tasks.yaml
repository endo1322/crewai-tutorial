research_task:
  description: >
    {topic} について徹底的にリサーチしてください。
    現在の年は {current_year} であることを踏まえ、
    興味深く関連性の高い情報を必ず見つけ出してください。
  expected_output: >
    {topic} に関する最も重要な情報を10箇条のリストにまとめたもの
  agent: researcher

reporting_task:
  description: >
    受け取ったコンテキストを精査し、各トピックをレポートの完全なセクションに展開してください。
    レポートは詳細で、関連するすべての情報を含むようにしてください。
  expected_output: >
    主要トピックごとに完全なセクションを持つ、本格的なレポート。
    '```' を使わずマークダウン形式でフォーマットすること。
  agent: reporting_analyst
